<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>kolastreet</title>
<link rel="stylesheet" href="style.css" />
</head>

<body>

<header>
<h1>kolastreet</h1>
<a class="insta" href="https://www.instagram.com/" target="_blank">
<img src="assets/icons/instagram.svg" alt="Instagram" />
</a>
</header>

<div class="gallery">
<div class="item"><img src="gallery/img1.jpg" alt=""></div>
<div class="item"><img src="gallery/img2.jpg" alt=""></div>
<div class="item"><img src="gallery/img3.jpg" alt=""></div>
<div class="item"><img src="gallery/img4.jpg" alt=""></div>
<div class="item"><img src="gallery/img5.jpg" alt=""></div>
<div class="item"><img src="gallery/img6.jpg" alt=""></div>
</div>

<div id="lightbox" class="lightbox">
<span id="closeBtn">&times;</span>
<img id="lightboxImg" src="">
</div>

<script>
const galleryItems = document.querySelectorAll('.gallery img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
const closeBtn = document.getElementById('closeBtn');

galleryItems.forEach(img => {
img.addEventListener('click', () => {
lightbox.style.display = 'flex';
lightboxImg.src = img.src;
});
});

closeBtn.addEventListener('click', () => {
lightbox.style.display = 'none';
});

lightbox.addEventListener('click', (e) => {
if(e.target === lightbox){
lightbox.style.display = 'none';
}
});
</script>

</body>
</html>
